<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>대학생 성장 기록</title>
<link rel="stylesheet" href="style.css">
</head><body>
<header><h1>📚 대학생 성장 기록</h1>
<nav>
<a href="index.html">홈</a>
<a href="routine.html">루틴 기록</a>
<a href="statistics.html">성장 통계</a>
<a href="goals.html">목표 관리</a>
<a href="mypage.html">마이페이지</a>
</nav></header>

<section class="hero">
<h2>오늘의 목표를 기록하고 성장하세요</h2>
<p id="quote"></p>
</section>

<div class="grid">
<div class="card">
<h3>오늘 공부 시간</h3>
<input id="study" type="number" placeholder="시간">
<button onclick="saveStudy()">저장</button>
</div>

<div class="card">
<h3>오늘 목표</h3>
<input id="goal" type="text" placeholder="목표 입력">
<button onclick="saveGoal()">저장</button>
</div>

<div class="card">
<h3>달성률</h3>
<div class="progress"><div id="bar"></div></div>
<button onclick="completeGoal()">달성 +20%</button>
</div>
</div>
<script src="script.js"></script>
</body></html>
